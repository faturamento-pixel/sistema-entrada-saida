<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Sofisticatto</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login" class="login-container">

  <div class="login-box">

    <img
      src="https://i.imgur.com/8Km9tLL.png"
      class="logo"
    >

    <input
      type="text"
      id="usuario"
      placeholder="Usuário"
    >

    <input
      type="password"
      id="senha"
      placeholder="Senha"
    >

    <button onclick="fazerLogin()">
      Entrar
    </button>

  </div>

</div>

<div id="sistema" style="display:none;">

  <div class="topo">
    <h1>Sistema Entrada e Saída</h1>
  </div>

  <div class="conteudo">

    <div class="menu-lateral">

      <button>Cadastro Produtos</button>

      <button>Registrar Entrada</button>

      <button>Registro Entrada</button>

      <button>Pesquisa Produto</button>

    </div>

    <div class="painel">

      <h2>
        Sistema carregado com sucesso 😁
      </h2>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="script.js"></script>

</body>
</html>
